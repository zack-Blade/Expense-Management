<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Expense Manager</title>
  <link rel="stylesheet" href="style2.css" />
</head>
<body>
  <header>
    <h1>Expense Manager</h1>
    <p>Simple single-file web app — data saved to your browser (localStorage).</p>
  </header>

  <main class="container">
    <section class="controls">
      <form id="expense-form">
        <input type="hidden" id="expense-id" />
        <div class="row">
          <div class="col">
            <label for="description">Description</label>
            <input id="description" type="text" placeholder="Coffee, Rent, Groceries" required />
          </div>
          <div class="col">
            <label for="amount">Amount</label>
            <input id="amount" type="number" step="0.01" min="0" placeholder="0.00" required />
          </div>
          <div class="col">
            <label for="date">Date</label>
            <input id="date" type="date" required />
          </div>
          <div class="col">
            <label for="category">Category</label>
            <select id="category">
              <option value="General">General</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Rent">Rent</option>
              <option value="Utilities">Utilities</option>
              <option value="Entertainment">Entertainment</option>
            </select>
          </div>
        </div>

        <div class="row actions">
          <button type="submit" id="save-btn">Add Expense</button>
          <button type="button" id="cancel-edit" class="hidden">Cancel Edit</button>
        </div>
      </form>

      <div class="filters">
        <label>
          Month filter:
          <input type="month" id="month-filter" />
        </label>
        <button id="clear-filter">Clear</button>
        <div class="export-import">
          <button id="export-csv">Export CSV</button>
          <label class="import-label">
            Import CSV
            <input type="file" id="import-csv" accept=".csv" />
          </label>
        </div>
      </div>
    </section>

    <section class="summary">
      <div>Total: <span id="total-amount">$0.00</span></div>
      <div>Count: <span id="expense-count">0</span></div>
    </section>

    <section class="list">
      <table id="expenses-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th>Category</th>
            <th class="amount-col">Amount</th>
            <th class="actions-col">Actions</th>
          </tr>
        </thead>
        <tbody id="expenses-body">
          <!-- rows injected here -->
        </tbody>
      </table>
    </section>
  </main>

  <footer>
    <small>Built with plain HTML/CSS/JS — localStorage only.</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
